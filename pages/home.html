<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
     <!-- /////////////////////////// -->

    <title>Windows 11 Mobile</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../script.js" defer></script>
</head>
<body>
    <h1>Windows 11 Mobile</h1>
    <div class="aparelho">
       

        <div class="tela">

            <!-- DESLIGADO -->
            <div class="telaDesl">
                
            </div>

            <!-- LOCKSCREEN -->
            <div class="telaBlock sumir">

                <!-- Relógio Lockscreen -->
                <div class="clock">21:02</div>
                <div class="data">Quarta-feira, 21 de Novembro</div>

                <!-- Notificações Lockscreen -->
                <div class="notifi1">
                    
                    <strong><h6> <img class="instagramNotifi" src="../img/instagramNotifi.png" alt=""> Instagram • 15min</h6></strong>
                    <span> @jairmessiasbolsonaro</span> ♥ curtiu seu story<br>
                    <span> @lulaoficial</span> está seguindo você

                </div>
                <div class="notifi2">
                    
                   
                        <strong><h6> <img class="instagramNotifi" src="../img/whatsNotifi.png" alt=""> WhatsApp • 2min</h6></strong>
                    </span>
                    <strong> (83)9 9999-6666</strong>: Reunião vai ser às 5 hrs<br>
                    <strong> Monark🍁</strong>: tou sendo censurado&#128532;

                </div>


                <!-- Cadeado Lockscreen -->
                <img class="cadeado" src="../img/lock.png" alt="">
                
            </div>

            <!-- TELA INICIAL -->
            <div class="telaInicial sumir">

                <div class="pesquisar">
                    
                        <div class="pesquisaGoogle" style="margin-top: -10px;">
                            <span style="color: #4285f4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285f4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span> <img class="micGoogle" src="../img/micGoogle.png" alt="">
                        </div>
                   

                    <input type="text" class="digitar" value="">
                </div>

                <div class="flex-widgets">
                    <div class="widgetAgenda">
                        <div class="diaSemana">
                            Olá
                        </div>
                    </div>

                    <div class="widgetStore"></div>
                    <div class="widgetCamera"></div>
                    <div class="widgetLigar"></div>
                    <div class="widgetMensagem"></div>

                    <div class="widgetClima"></div>
                    
                    <div class="widgetWhatsapp"></div>
                    <div class="widgetInstagram"></div>
                    <div class="widgetMusic"></div>
                    <div class="widgetYoutube"></div>
                </div>
                

                <div class="act-btn">
                    <img src="../img/actArrow.png" alt="" class="actArrow acts">
                    <img src="../img/actWindows.png" alt="" class="actWindows acts">
                    <img src="../img/actTask.png" alt="" class="actTask acts">
                </div>
            </div>

            

            <!-- BOTÕES -->
            <div class="btnPower"></div>
            <div class="btnMais"></div>
            <div class="btnMenos"></div>
        </div>
        <img class="corpoAparelho" src="../img/phoneB.png" alt="">
    
        
    </div>
    
</body>
</html>
