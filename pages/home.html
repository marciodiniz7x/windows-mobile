<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
     <!-- /////////////////////////// -->

    <title>Windows Mobile</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../script.js" defer></script>
</head>
<body>
    <h1>Windows Mobile</h1>
    <div class="aparelho">
       

        <div class="tela">

            <!-- DESLIGADO -->
            <div class="telaDesl sumir">
                
            </div>

            <!-- LOCKSCREEN -->
            <div class="telaBlock sumir">

                <!-- Relógio Lockscreen -->
                <div class="clock">21:02</div>
                <div class="data">Quarta-feira, 21 de Novembro</div>

                <!-- Notificações Lockscreen -->
                <div class="notifi1">
                    
                    <strong><h6> <img class="instagramNotifi" src="../img/instagramNotifi.png" alt=""> Instagram • 15min</h6></strong>
                    <span> @jairmessiasbolsonaro</span> ♥ curtiu seu story<br>
                    <span> @lulaoficial</span> está seguindo você

                </div>
                <div class="notifi2">
                    
                   
                        <strong><h6> <img class="instagramNotifi" src="../img/whatsNotifi.png" alt=""> WhatsApp • 2min</h6></strong>
                    </span>
                    <strong> (83)9 9999-6666</strong>: Reunião vai ser às 5 hrs<br>
                    <strong> Monark🍁</strong>: tou sendo censurado&#128532;

                </div>


                <!-- Cadeado Lockscreen -->
                <img class="cadeado" src="../img/lock.png" alt="">
                
            </div>

            <!-- TELA INICIAL -->
            <div class="wallpaper"></div>
            

            <!-- BOTÕES -->
            <div class="btnPower"></div>
        </div>
        <img class="corpoAparelho" src="../img/phoneB.png" alt="">
    
        
    </div>
    
</body>
</html>
